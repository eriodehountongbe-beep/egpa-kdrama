<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Classement K-Dramas</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --master:    #1A1A2E;
    --tresbien:  #0D3B6E;
    --bien:      #145A32;
    --assez:     #7D6608;
    --passable:  #922B21;
    --bg: #0a0a0f;
    --card-bg: #13131e;
    --text: #e8e4f0;
    --muted: #8880a0;
    --accent: #b39ddb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* HERO */
  .hero {
    text-align: center;
    padding: 60px 20px 40px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(99,60,200,.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 8vw, 96px);
    letter-spacing: 4px;
    color: #fff;
    text-shadow: 0 0 60px rgba(179,157,219,.4);
    line-height: 1;
  }
  .hero-sub {
    margin-top: 12px;
    font-size: 15px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .hero-search {
    margin: 28px auto 0;
    max-width: 420px;
    position: relative;
  }
  .hero-search input {
    width: 100%;
    padding: 12px 20px 12px 44px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(179,157,219,.25);
    border-radius: 50px;
    color: var(--text);
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color .2s;
  }
  .hero-search input:focus { border-color: var(--accent); }
  .hero-search input::placeholder { color: var(--muted); }
  .hero-search svg {
    position: absolute; left: 15px; top: 50%; transform: translateY(-50%);
    opacity: .5; pointer-events: none;
  }

  /* NAV TABS */
  .nav-tabs {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    padding: 20px 20px 0;
  }
  .tab-btn {
    padding: 8px 18px;
    border-radius: 50px;
    border: 1px solid rgba(255,255,255,.12);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all .2s;
    white-space: nowrap;
  }
  .tab-btn:hover, .tab-btn.active {
    color: #fff;
    border-color: currentColor;
  }
  .tab-btn[data-cat="master"].active      { color: #b39ddb; border-color: #b39ddb; background: rgba(179,157,219,.1); }
  .tab-btn[data-cat="tresbien"].active    { color: #64b5f6; border-color: #64b5f6; background: rgba(100,181,246,.1); }
  .tab-btn[data-cat="bien"].active        { color: #69f0ae; border-color: #69f0ae; background: rgba(105,240,174,.1); }
  .tab-btn[data-cat="assez"].active       { color: #ffd54f; border-color: #ffd54f; background: rgba(255,213,79,.1); }
  .tab-btn[data-cat="passable"].active    { color: #ef9a9a; border-color: #ef9a9a; background: rgba(239,154,154,.1); }

  /* SECTION */
  .section { padding: 40px 20px 20px; max-width: 1400px; margin: 0 auto; }
  .section.hidden { display: none; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(255,255,255,.08);
  }
  .section-stars { font-size: 22px; }
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
  }
  .section-count {
    margin-left: auto;
    font-size: 13px;
    color: var(--muted);
    background: rgba(255,255,255,.06);
    padding: 4px 12px;
    border-radius: 50px;
  }
  .master    .section-title { color: #b39ddb; }
  .tresbien  .section-title { color: #64b5f6; }
  .bien      .section-title { color: #69f0ae; }
  .assez     .section-title { color: #ffd54f; }
  .passable  .section-title { color: #ef9a9a; }

  /* GRID */
  .drama-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
  }

  /* CARD */
  .drama-card {
    background: var(--card-bg);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,.06);
    transition: transform .25s, box-shadow .25s;
    cursor: pointer;
    position: relative;
  }
  .drama-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 40px rgba(0,0,0,.5);
    border-color: rgba(179,157,219,.2);
  }
  .drama-card.hidden { display: none; }

  .poster-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 2/3;
    background: #1e1e2e;
    overflow: hidden;
  }
  .poster-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform .4s;
  }
  .drama-card:hover .poster-wrap img { transform: scale(1.04); }


  .year-badge {
    position: absolute;
    top: 8px; left: 8px;
    background: rgba(0,0,0,.7);
    backdrop-filter: blur(6px);
    color: rgba(255,255,255,.75);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 50px;
    font-weight: 700;
    letter-spacing: .5px;
  }
  .eps-badge {
    position: absolute;
    bottom: 8px; right: 8px;
    background: rgba(0,0,0,.7);
    backdrop-filter: blur(6px);
    color: rgba(255,255,255,.65);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 50px;
    letter-spacing: .5px;
    font-weight: 600;
  }
  .modal-eps {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .poster-placeholder {
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    color: rgba(255,255,255,.1);
    background: linear-gradient(135deg, #1e1e2e 0%, #2a2a3e 100%);
  }

  .genre-badge {
    position: absolute;
    bottom: 8px; left: 8px;
    background: rgba(0,0,0,.7);
    backdrop-filter: blur(6px);
    color: rgba(255,255,255,.75);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 50px;
    letter-spacing: .5px;
    font-weight: 600;
    text-transform: uppercase;
  }

  .card-body {
    padding: 12px 14px 14px;
  }
  .card-title {
    font-weight: 600;
    font-size: 14px;
    line-height: 1.3;
    margin-bottom: 6px;
    color: #fff;
  }
  .card-synopsis {
    font-size: 11.5px;
    color: var(--muted);
    font-style: italic;
    line-height: 1.5;
    margin-bottom: 8px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-avis {
    font-size: 12px;
    color: #c8c0e0;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.8);
    backdrop-filter: blur(8px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #1a1a2a;
    border-radius: 16px;
    max-width: 680px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    border: 1px solid rgba(255,255,255,.1);
    box-shadow: 0 40px 100px rgba(0,0,0,.6);
    animation: modalIn .25s ease;
  }
  @keyframes modalIn { from { opacity:0; transform: scale(.96) translateY(10px); } }
  .modal-inner {
    display: flex;
    gap: 0;
  }
  .modal-poster {
    width: 220px;
    flex-shrink: 0;
    position: relative;
  }
  .modal-poster img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 16px 0 0 16px;
  }
  .modal-poster-ph {
    width: 100%; height: 100%; min-height: 320px;
    display: flex; align-items: center; justify-content: center;
    font-size: 60px;
    background: linear-gradient(135deg, #1e1e2e 0%, #2a2a3e 100%);
    border-radius: 16px 0 0 16px;
  }
  .modal-content {
    padding: 28px 28px 28px 24px;
    flex: 1;
  }
  .modal-cat-badge {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .modal-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 22px;
    color: #fff;
    margin-bottom: 6px;
    line-height: 1.3;
  }
  .modal-genre {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .modal-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .modal-synopsis {
    font-style: italic;
    font-size: 13.5px;
    color: #b0a8c8;
    line-height: 1.7;
    margin-bottom: 16px;
  }
  .modal-avis {
    font-size: 13.5px;
    color: var(--text);
    line-height: 1.7;
    margin-bottom: 16px;
  }
  .modal-platforms {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-top: 4px;
  }
  .platform-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 50px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .4px;
    text-decoration: none;
    cursor: default;
    transition: opacity .2s, transform .15s;
    white-space: nowrap;
  }
  .platform-badge:hover { opacity: .85; transform: translateY(-1px); }
  .pb-netflix   { background: #e50914; color: #fff; }
  .pb-disney    { background: #113ccf; color: #fff; }
  .pb-viki      { background: #1da0f2; color: #fff; }
  .pb-viu       { background: #ffcc00; color: #111; }
  .pb-voirdrama { background: #9c27b0; color: #fff; }
  .pb-frstream { background:  #e65100; color: #fff; }
  .pb-tving     { background: #ff5c00; color: #fff; }
  .pb-wavve     { background: #0095ff; color: #fff; }
  .pb-kocowa    { background: #00b894; color: #fff; }
  .pb-youtube   { background: #ff0000; color: #fff; }
  .pb-other     { background: rgba(255,255,255,.12); color: var(--text); }
  .modal-close {
    position: absolute;
    top: 14px; right: 14px;
    background: rgba(255,255,255,.1);
    border: none;
    color: #fff;
    width: 32px; height: 32px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s;
  }
  .modal-close:hover { background: rgba(255,255,255,.2); }
  .modal-wrap { position: relative; }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 24px;
    flex-wrap: wrap;
    padding: 24px 20px;
    background: rgba(255,255,255,.03);
    border-top: 1px solid rgba(255,255,255,.06);
    border-bottom: 1px solid rgba(255,255,255,.06);
    margin-bottom: 10px;
  }
  .stat { text-align: center; }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 28px; }
  .stat-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .stat.master .stat-num   { color: #b39ddb; }
  .stat.tresbien .stat-num { color: #64b5f6; }
  .stat.bien .stat-num     { color: #69f0ae; }
  .stat.assez .stat-num    { color: #ffd54f; }
  .stat.passable .stat-num { color: #ef9a9a; }

  /* EMPTY STATE */
  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 15px;
    display: none;
    grid-column: 1 / -1;
  }
  .no-results.show { display: block; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: rgba(179,157,219,.3); border-radius: 3px; }

  /* PLATFORM DISCLAIMER */
  .platform-disclaimer {
    font-size: 10.5px;
    color: var(--muted);
    margin-top: 6px;
    font-style: italic;
    opacity: .8;
  }

  /* VOTE SYSTEM */
  .vote-section {
    margin-top: 18px;
    padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,.07);
  }
  .vote-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .vote-desc {
    font-size: 11.5px;
    color: var(--muted);
    margin-bottom: 10px;
    font-style: italic;
  }
  .vote-buttons {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .vote-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 16px;
    border-radius: 50px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
  }
  .vote-btn:disabled { opacity: .4; cursor: not-allowed; }
  .vote-up   { background: rgba(105,240,174,.15); color: #69f0ae; border: 1px solid rgba(105,240,174,.3); }
  .vote-down { background: rgba(239,154,154,.15); color: #ef9a9a; border: 1px solid rgba(239,154,154,.3); }
  .vote-up:hover:not(:disabled)   { background: rgba(105,240,174,.28); }
  .vote-down:hover:not(:disabled) { background: rgba(239,154,154,.28); }
  .vote-bar-wrap {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,.08);
    border-radius: 3px;
    overflow: hidden;
  }
  .vote-bar {
    height: 100%;
    border-radius: 3px;
    transition: width .4s, background .4s;
  }
  .vote-status {
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
  }
  .vote-promoted {
    display: inline-block;
    margin-top: 8px;
    padding: 4px 12px;
    border-radius: 50px;
    background: rgba(105,240,174,.15);
    color: #69f0ae;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .5px;
  }
  .vote-demoted {
    display: inline-block;
    margin-top: 8px;
    padding: 4px 12px;
    border-radius: 50px;
    background: rgba(239,154,154,.15);
    color: #ef9a9a;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .5px;
  }
  .vote-perfect {
    background: rgba(179,157,219,.15);
    color: #b39ddb;
    border: 1px solid rgba(179,157,219,.3);
  }
  .vote-perfect:hover:not(:disabled) { background: rgba(179,157,219,.28); }
  .vote-perfect.active {
    background: rgba(179,157,219,.35);
    color: #fff;
    border-color: #b39ddb;
    box-shadow: 0 0 10px rgba(179,157,219,.3);
  }
  .vote-up.active {
    background: rgba(105,240,174,.35);
    color: #fff;
    border-color: #69f0ae;
    box-shadow: 0 0 10px rgba(105,240,174,.3);
  }
  .vote-down.active {
    background: rgba(239,154,154,.35);
    color: #fff;
    border-color: #ef9a9a;
    box-shadow: 0 0 10px rgba(239,154,154,.3);
  }
  .vote-change {
    display: inline-block;
    margin-top: 10px;
    padding: 4px 12px;
    border-radius: 50px;
    background: transparent;
    border: 1px solid rgba(255,255,255,.15);
    color: var(--muted);
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all .2s;
  }
  .vote-change:hover { border-color: var(--accent); color: var(--accent); }

  /* COMMENTS */
  .comments-section {
    margin-top: 18px;
    padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,.07);
  }
  .comments-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .comment-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .comment-item {
    background: rgba(255,255,255,.04);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 12.5px;
    color: var(--text);
    line-height: 1.5;
  }
  .comment-meta {
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 3px;
  }
  .comment-input-wrap { display: flex; gap: 8px; }
  .comment-input {
    flex: 1;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 9px 14px;
    outline: none;
    transition: border-color .2s;
  }
  .comment-input:focus { border-color: var(--accent); }
  .comment-input::placeholder { color: var(--muted); }
  .comment-send {
    padding: 9px 16px;
    background: rgba(179,157,219,.2);
    border: 1px solid rgba(179,157,219,.35);
    border-radius: 8px;
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background .2s;
  }
  .comment-send:hover { background: rgba(179,157,219,.35); }
  .no-comments { font-size: 12px; color: var(--muted); font-style: italic; margin-bottom: 10px; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-title">K-Drama<br>Classement</div>
  <div class="hero-sub">200+ séries • classées & commentées</div>
  <div class="hero-search">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="rgba(255,255,255,.5)" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="search" placeholder="Rechercher un drama..." autocomplete="off">
  </div>
</div>

<div class="stats-bar">
  <div class="stat master"><div class="stat-num" id="cnt-master">27</div><div class="stat-lbl">⭐⭐⭐⭐⭐ Master</div></div>
  <div class="stat tresbien"><div class="stat-num" id="cnt-tresbien">73</div><div class="stat-lbl">⭐⭐⭐⭐ Très bien</div></div>
  <div class="stat bien"><div class="stat-num" id="cnt-bien">68</div><div class="stat-lbl">⭐⭐⭐ Bien</div></div>
  <div class="stat assez"><div class="stat-num" id="cnt-assez">12</div><div class="stat-lbl">⭐⭐ Assez bien</div></div>
  <div class="stat passable"><div class="stat-num" id="cnt-passable">2</div><div class="stat-lbl">⭐ Passable</div></div>
</div>

<div class="nav-tabs">
  <button class="tab-btn active" data-cat="all">Tous</button>
  <button class="tab-btn" data-cat="master">⭐⭐⭐⭐⭐ Master</button>
  <button class="tab-btn" data-cat="tresbien">⭐⭐⭐⭐ Très bien</button>
  <button class="tab-btn" data-cat="bien">⭐⭐⭐ Bien</button>
  <button class="tab-btn" data-cat="assez">⭐⭐ Assez bien</button>
  <button class="tab-btn" data-cat="passable">⭐ Passable</button>
</div>

<div id="sections-container"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal-wrap">
    <div class="modal" id="modal">
      <div class="modal-inner" id="modal-inner"></div>
    </div>
    <button class="modal-close" onclick="closeModalBtn()">✕</button>
  </div>
</div>

<script>
const DRAMAS = {
  "master": {
    label: "⭐⭐⭐⭐⭐ MASTER",
    cls: "master",
    items: [
      ["Crash Landing on You","Une héritière sud-coréenne atterrit accidentellement en Corée du Nord après un accident de parapente et tombe amoureuse d'un officier de l'armée nord-coréenne.","Chef-d'œuvre romantique absolu. Hyun Bin et Son Ye-jin créent une alchimie qui transcende les frontières — au sens propre comme au figuré.","Romance / Thriller","16 ép.",2019],
      ["Goblin","Un guerrier immortel de l'ère Goryeo cherche sa fiancée réincarnée pour mettre fin à sa malédiction éternelle.","Magnifique visuellement, écriture poétique, cast inoubliable. Gong Yoo est la définition du male lead parfait.","Fantasy / Romance","16 ép.",2016],

async function loadPoster(img, title) {
  const showFallback = () => { img.style.display='none'; img.nextElementSibling.style.display='flex'; };
  try {
    let posterPath = null;
    if (FORCED_IDS[title]) {
      const res = await fetch(`https://api.themoviedb.org/3/tv/${FORCED_IDS[title]}?api_key=${KEY}`);
      const data = await res.json();
      posterPath = data.poster_path || null;
    } else {
      const searchTitle = title.replace(/\(.*?\)/g, '').replace(/[12,3]+$/, '').trim();
      const res = await fetch(`https://api.themoviedb.org/3/search/tv?api_key=${KEY}&query=${encodeURIComponent(searchTitle)}&language=fr-FR`);
      const data = await res.json();
      if (data.results && data.results.length > 0) {
        const item = data.results.find(r => r.origin_country && r.origin_country.includes('KR')) || data.results[0];
        posterPath = item ? item.poster_path : null;
      }
    }
    if (posterPath) {
      img.onerror = showFallback;
      img.src = `https://image.tmdb.org/t/p/w342${posterPath}`;
    } else {
      showFallback();
    }
  } catch(e) {
    showFallback();
  }
}

function filterCards(query) {
  const q = query.toLowerCase().trim();
  let anyVisible = false;
  document.querySelectorAll('.drama-card').forEach(card => {
    const sectionHidden = card.closest('.section').classList.contains('hidden');
    if (sectionHidden) { card.classList.add('hidden'); return; }
    const match = !q || card.dataset.title.includes(q) || card.dataset.genre.includes(q);
    card.classList.toggle('hidden', !match);
    if (match) anyVisible = true;
  });
}

// ── VOTE SYSTEM ─────────────────────────────────────────────────────────────
const CAT_ORDER = ['passable','assez','bien','tresbien','master'];
const CAT_LABELS = { master:'⭐⭐⭐⭐⭐ MASTER', tresbien:'⭐⭐⭐⭐ TRÈS BIEN', bien:'⭐⭐⭐ BIEN', assez:'⭐⭐ ASSEZ BIEN', passable:'⭐ PASSABLE' };
const VOTE_THRESHOLD = 10;

const API_BASE = (typeof window !== 'undefined' && window.location.hostname === 'localhost') ? 'http://localhost:3000/api' : '/api';

function getUserId() {
  try {
    let id = localStorage.getItem('kd_user');
    if (!id) {
      id = (crypto && crypto.randomUUID) ? crypto.randomUUID() : ('u-' + Date.now() + '-' + Math.random().toString(36).slice(2));
      localStorage.setItem('kd_user', id);
    }
    return id;
  } catch(e) { return 'u-anon'; }
}

async function getVotesAPI(title) {
  try {
    const userId = getUserId();
    const res = await fetch(`${API_BASE}/votes/${encodeURIComponent(title)}?userId=${encodeURIComponent(userId)}`);
    if (!res.ok) throw new Error('network');
    return await res.json();
  } catch(e) { return { up:0, down:0, perfect:0, net:0, voted: null }; }
}

async function castVoteAPI(title, vote) {
  try {
    const userId = getUserId();
    const res = await fetch(`${API_BASE}/votes/${encodeURIComponent(title)}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId, vote })
    });
    if (!res.ok) throw new Error('network');
    return await res.json();
  } catch(e) { return null; }
}

function buildVoteHTMLFromData(title, catCls, v) {
  const total = v.up + v.down + v.perfect;
  const catIdx = CAT_ORDER.indexOf(catCls);
  const canUp = catIdx < CAT_ORDER.length - 1;
  const canDown = catIdx > 0;
  const netScore = (v.up||0) - (v.down||0);
  const t = title.replace(/'/g, "\\'");
  const hasVoted = v.voted !== null && v.voted !== undefined;

  let statusMsg = '';
  if (v.voted === 'perfect') {
    statusMsg = `<span class="vote-promoted">✨ Tu penses que c'est la place idéale !</span>`;
  } else if (netScore >= VOTE_THRESHOLD && canUp) {
    statusMsg = `<span class="vote-promoted">🚀 Ce drama mérite d'être promu ! (${netScore}/${VOTE_THRESHOLD})</span>`;
  } else if (netScore <= -VOTE_THRESHOLD && canDown) {
    statusMsg = `<span class="vote-demoted">⬇️ Ce drama devrait descendre (${netScore}/${-VOTE_THRESHOLD})</span>`;
  } else {
    statusMsg = `<span class="vote-status">Score : ${netScore > 0 ? '+' : ''}${netScore} / seuil ±${VOTE_THRESHOLD} pour changer de classe</span>`;
  }

  const changeBtn = hasVoted
    ? `<button class="vote-change" onclick="resetVoteClient('${t}','${catCls}')">↩ Changer mon avis</button>`
    : '';

  return `
    <div class="vote-section" id="vote-section-${CSS.escape(title)}">
      <div class="vote-label">Ce drama mérite-t-il mieux ou moins ?</div>
      <div class="vote-desc">Au bout de ${VOTE_THRESHOLD} votes d'écart, il change de classe automatiquement.</div>
      <div class="vote-buttons">
        <button class="vote-btn vote-up ${v.voted==='up'?'active':''}" onclick="castVoteClient('${t}','up','${catCls}')" ${hasVoted && v.voted!=='up' ? 'disabled' : ''}>▲ Mérite mieux <small>(${v.up||0})</small></button>
        <button class="vote-btn vote-perfect ${v.voted==='perfect'?'active':''}" onclick="castVoteClient('${t}','perfect','${catCls}')" ${hasVoted && v.voted!=='perfect' ? 'disabled' : ''}>✦ Place idéale <small>(${v.perfect||0})</small></button>
        <button class="vote-btn vote-down ${v.voted==='down'?'active':''}" onclick="castVoteClient('${t}','down','${catCls}')" ${hasVoted && v.voted!=='down' ? 'disabled' : ''}>▼ Mérite moins <small>(${v.down||0})</small></button>
      </div>
      <div>${statusMsg}</div>
      ${changeBtn}
    </div>`;
}

window.castVoteClient = async function(title, dir, catCls) {
  const resp = await castVoteAPI(title, dir);
  if (!resp) return alert('Erreur réseau, réessayez');
  // Update modal vote section
  const container = document.querySelector('.modal-overlay .modal-content');
  if (container) {
    const voteContainer = container.querySelector('.vote-section') || container.querySelector('#modal-vote-placeholder');
    if (voteContainer) {
      voteContainer.outerHTML = buildVoteHTMLFromData(title, catCls, resp);
    }
  }

  // If threshold reached, move locally (client-side)
  const net = resp.up - resp.down;
  let currentCat = catCls;
  for (const [key, cat] of Object.entries(DRAMAS)) {
    if (cat.items.some(d => d[0] === title)) { currentCat = key; break; }
  }
  const catIdx = CAT_ORDER.indexOf(currentCat);
  if (net >= VOTE_THRESHOLD && catIdx < CAT_ORDER.length - 1) moveDrama(title, currentCat, CAT_ORDER[catIdx + 1]);
  else if (net <= -VOTE_THRESHOLD && catIdx > 0) moveDrama(title, currentCat, CAT_ORDER[catIdx - 1]);
};

window.resetVoteClient = async function(title, catCls) {
  // Toggle off by re-sending the current vote (server toggles when same vote received)
  const v = await getVotesAPI(title);
  if (v && v.voted) {
    await castVoteAPI(title, v.voted);
  }
  const fresh = await getVotesAPI(title);
  const container = document.querySelector('.modal-overlay .modal-content');
  if (container) {
    const voteContainer = container.querySelector('.vote-section') || container.querySelector('#modal-vote-placeholder');
    if (voteContainer) voteContainer.outerHTML = buildVoteHTMLFromData(title, catCls, fresh);
  }
};

// Fetch sorted list of dramas from server and render a global ranking section
async function fetchSortedDramas() {
  try {
    const titles = [];
    for (const cat of Object.values(DRAMAS)) cat.items.forEach(d => titles.push(d[0]));
    const res = await fetch(`${API_BASE}/dramas/sort`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ titles })
    });
    if (!res.ok) return;
    const sorted = await res.json();
    buildGlobalRankingSection(sorted);

}

function buildGlobalRankingSection(sorted) {
  const container = document.getElementById('sections-container');

  const existing = document.getElementById('global-ranking-section');
  if (existing) existing.remove();

      <div class="section-count">${sorted.length} dramas</div>

  `;
  // insert at top
  container.insertBefore(section, container.firstChild);

  const grid = document.getElementById('grid-global');
  const max = Math.min(sorted.length, 24);
  for (let i = 0; i < max; i++) {
    const item = sorted[i];
    const info = findDramaByTitle(item.title);
    if (!info) continue;
    const [title, synopsis, avis, genre, eps, year] = info.drama;
    const card = document.createElement('div');
    card.className = 'drama-card';
    card.dataset.title = title.toLowerCase();
    card.dataset.genre = genre.toLowerCase();
    card.dataset.cat = info.catKey;
    const genrePrimary = genre.split('/')[0].trim();
    card.innerHTML = `
      <div class="poster-wrap">
        <img src="" alt="${title}" loading="lazy">
        <div class="poster-placeholder" style="display:none">🎬</div>
        <div class="genre-badge">${genrePrimary}</div>
        ${eps ? `<div class="eps-badge">${eps}</div>` : ''}
        ${year ? `<div class="year-badge">${year}</div>` : ''}
      </div>
      <div class="card-body">
        <div class="card-title">${title} <span style="float:right; font-size:12px; color:var(--muted);">${item.aggregates.net || 0}</span></div>
        <div class="card-synopsis">${synopsis}</div>
        <div class="card-avis">${avis}</div>
      </div>`;
    card.addEventListener('click', () => openModal(title, synopsis, avis, genre, eps, year, '', info.catKey, card.querySelector('img').src));
    grid.appendChild(card);
    loadPoster(card.querySelector('img'), title);
  }
}

// ── COMMENTS (server-backed) ────────────────────────────────────────────────
async function getCommentsAPI(title) {
  try {
    const res = await fetch(`${API_BASE}/comments/${encodeURIComponent(title)}`);
    if (!res.ok) throw new Error('network');
    return await res.json();
  } catch(e) { return []; }
}

async function postCommentAPI(title, user, text) {
  try {
    const res = await fetch(`${API_BASE}/comments/${encodeURIComponent(title)}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user, text })
    });
    if (!res.ok) throw new Error('network');
    return await res.json();
  } catch(e) { return null; }
}

async function renderComments(title) {
  const comments = await getCommentsAPI(title);
  const listEl = document.getElementById('comment-list-' + CSS.escape(title));
  if (!listEl) return;
  const listHTML = comments.length === 0
    ? `<div class="no-comments">Aucun commentaire — sois le premier !</div>`
    : comments.map(c => `
        <div class="comment-item">
          <div class="comment-meta">${new Date(c.created_at).toLocaleString('fr-FR', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' })}</div>
          ${c.text}
        </div>`).join('');
  listEl.innerHTML = listHTML;
  const label = document.getElementById('comments-label-' + CSS.escape(title));
  if (label) label.textContent = `💬 Commentaires (${comments.length})`;
}

async function postCommentClient(title) {
  const inputId = 'comment-input-' + CSS.escape(title);
  const input = document.getElementById(inputId);
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  // optional: use stored user name or null
  const user = 'Visiteur';
  const resp = await postCommentAPI(title, user, text);
  if (!resp) return alert('Erreur lors de l\'envoi du commentaire');
  input.value = '';
  await renderComments(title);
}
